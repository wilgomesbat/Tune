<style>

    @font-face {
    font-family: 'Nationale Regular';
    src: url('./fonts/Nationale-Regular.woff2') format('woff2'),
         url('./fonts/Nationale-Regular.woff') format('woff');
    font-weight: normal; font-style: normal;
}
@font-face {
    font-family: 'Nationale Bold';
    src: url('./fonts/Nationale-Bold.woff2') format('woff2'),
         url('./fonts/Nationale-Bold.woff') format('woff');
    font-weight: bold; font-style: normal;
}
@font-face {
    font-family: 'Nationale Black';
    src: url('./fonts/Nationale-Black.woff2') format('woff2'),
         url('./fonts/Nationale-Black.woff') format('woff');
    font-weight: bold; font-style: normal;
}


.sfa-dashboard-wrapper { max-width: 500px; margin: 0 auto; padding: 20px; font-family: 'Nationale Regular'; background: #ffffff; }

/* Card Vermelho Principal */
.sfa-focus-card { background: #000000; border-radius: 24px; padding: 32px; margin-bottom: 25px; color: #fff; }
.sfa-release-header { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
.sfa-cover-art { width: 90px; height: 90px; border-radius: 4px; object-fit: cover; }
.sfa-upper-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.8; }
.sfa-release-name { font-size: 22px; font-weight: 900; font-family: 'Nationale Black'; margin: 0; line-height: 1.1; }

.sfa-stats-hero { display: flex; align-items: center; gap: 15px; }
.sfa-big-number { font-size: 50px; font-family: 'Nationale Black'; font-weight: 900; line-height: 0.85; letter-spacing: -4px; }
.sfa-horizontal-line { flex-grow: 1; height: 6px; background: #ffffff; border-radius: 10px; }
.sfa-hero-desc { font-size: 28px; font-weight: 900; line-height: 1; margin: 15px 0 35px 0; width: 85%; }

/* Caixa Branca */
.sfa-metrics-white { background: #fff; color: #000; border-radius: 20px; padding: 20px; }
.sfa-live-row { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
.sfa-pulse-dot { width: 10px; height: 10px; background: #13de72; border-radius: 50%; animation: sfa-blink 1.5s infinite; }
.sfa-metrics-grid { display: flex; justify-content: space-between; }
.sfa-mini-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
.sfa-value-bold { font-size: 19px; font-family: 'Nationale Black'; font-weight: 900; }

/* Artist Pick */
.sfa-artist-pick-card { background: #000; border-radius: 32px; padding: 25px; border: 1px solid #1a1a1a; margin-bottom: 25px; }
.sfa-dashed-box { border: 2px dashed #333; border-radius: 20px; padding: 40px; text-align: center; color: #555; cursor: pointer; }
.sfa-white-pill { background: #fff; padding: 3px 14px 3px 3px; border-radius: 30px; display: flex; align-items: center; gap: 8px; width: fit-content; margin-bottom: 8px; }
.sfa-pill-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
.sfa-pill-text { color: #000; font-size: 11px; font-weight: 800; }
.sfa-pick-title { font-size: 24px; font-weight: 900; color: #fff; margin: 0; }
.sfa-pick-img { width: 120px; height: 120px; border-radius: 12px; object-fit: cover; }
.sfa-active-pick { display: flex; align-items: center; gap: 20px; }

/* Outros */
.sfa-station-card { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 24px; padding: 25px; }
.sfa-btn-white { background: #fff; color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
.sfa-top-tracks-card { background: #000000; border-radius: 24px; padding: 25px; color: white; border: 1px solid #1a1a1a; }

@keyframes sfa-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>

<div class="sfa-dashboard-wrapper">
    <section class="sfa-focus-card reveal">
        <div class="sfa-release-header">
            <img id="latest-cover" src="" class="sfa-cover-art">
            <div class="sfa-release-info">
                <span class="sfa-upper-label">Último Lançamento</span>
                <h1 id="latest-title" class="sfa-release-name">---</h1>
            </div>
        </div>

        <div class="sfa-stats-hero">
            <div id="latest-total-streams" class="sfa-big-number">0</div>
            <div class="sfa-horizontal-line"></div>
        </div>
        
        <p class="sfa-hero-desc">streams totais desde o lançamento</p>

        <div class="sfa-metrics-white">
            <div class="sfa-live-row">
                <span class="sfa-pulse-dot"></span>
                <span id="live-count">0</span> ouvindo agora
            </div>

            <div class="sfa-metrics-grid">
                
                <div class="sfa-metric-item">
                    <span class="sfa-mini-label">Streams (UN)</span>
                    <span id="stat-streams-7d" class="sfa-value-bold">0</span>
                </div>
                <div class="sfa-metric-item">
                    <span class="sfa-mini-label">Total Artista</span>
                    <span id="stat-total-artist-streams" class="sfa-value-bold">0</span>
                </div>
            </div>
        </div>
    </section>

    <section class="sfa-artist-pick-card">
        <div id="artist-pick-container">
            <div id="pinned-empty" class="sfa-dashed-box" onclick="abrirSeletorDestaque()">
                <p>+ Escolher um destaque do artista</p>
            </div>

            <div id="pinned-active" class="sfa-active-pick hidden" onclick="abrirSeletorDestaque()">
                <img id="pinned-img" src="" class="sfa-pick-img">
                <div class="sfa-pick-details">
                    <div class="sfa-white-pill">
                        <img id="pill-artist-photo" src="" class="sfa-pill-avatar">
                        <span id="pill-artist-name" class="sfa-pill-text">Artista</span>
                    </div>
                    <h2 id="pinned-title" class="sfa-pick-title">---</h2>
                    <span class="sfa-pick-tag">Destaque do Artista</span>
                </div>
            </div>
        </div>
    </section>

    <div class="sfa-bottom-grid">
        <div id="card-this-is-creator" class="sfa-station-card hidden">
            <span class="sfa-upper-label" style="color:white">Tune Stations</span>
            <h3 style="font-size: 1.2rem; font-weight: 900; color: white; margin: 10px 0;">Playlist "This Is"</h3>
            <button id="btn-gerar-thisis" class="sfa-btn-white">GERAR AGORA</button>
        </div>

        <div class="sfa-top-tracks-card">
            <h3 class="sfa-mini-label" style="margin-bottom: 20px;">Top Músicas</h3>
            <div id="top-tracks-list"></div>
        </div>
    </div>
</div>

<div id="modal-seletor" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] backdrop-blur-xl">
    <div class="bg-[#0a0a0a] border border-white/5 p-8 rounded-[32px] w-[450px]">
        <h3 class="text-white font-bold text-xl mb-4">Selecione seu Destaque</h3>
        <div id="lista-musicas-artista" class="max-h-80 overflow-y-auto mb-6 custom-scrollbar"></div>
        <button onclick="fecharSeletor()" class="text-gray-500 hover:text-white transition w-full py-2">Fechar</button>
    </div>
</div>

<div id="delete-confirm-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <div class="bg-[#111] p-6 rounded-xl border border-white/10 text-center">
        <h3 class="text-white font-bold mb-2">Excluir <span id="delete-item-title"></span>?</h3>
        <div class="flex gap-4 mt-4 justify-center">
            <button onclick="document.getElementById('delete-confirm-modal').classList.add('hidden')" class="px-4 py-2 text-gray-400">Cancelar</button>
            <button id="confirmDeleteButton" onclick="window.deleteRelease()" class="px-4 py-2 bg-red-600 text-white rounded-lg">Confirmar</button>
        </div>
    </div>
</div>

<canvas id="canvas-thisis" width="500" height="500" style="display: none;"></canvas>
